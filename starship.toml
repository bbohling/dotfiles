# Starship prompt config.
# Two layouts: MINIMAL (active) matches the existing oh-my-posh prompt.
# COMMON ADDITIONS adds exit-code-on-error, command duration, and git status.
# To switch: comment out the minimal `format` line and uncomment the additions one.

# ===== MINIMAL (active) =====
format = """
$directory$git_branch
$character"""

add_newline = false

# ===== COMMON ADDITIONS — uncomment to enable =====
# format = """
# $directory$git_branch$git_status
# $cmd_duration$character"""

[directory]
style = "cyan bold"
format = "[ $path]($style) "
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[git_branch]
style = "yellow"
symbol = " "
format = "[$symbol$branch]($style)"

[character]
success_symbol = "[→](cyan)"
error_symbol = "[→](red)"

# Settings the COMMON ADDITIONS format uses. Harmless if not in format.
[git_status]
style = "yellow"
format = " [$all_status$ahead_behind]($style)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "*"
staged = "+"
untracked = "?"
stashed = "$"
conflicted = "✗"

[cmd_duration]
min_time = 2000   # ms — only show for commands slower than this
format = "[$duration](dim yellow) "

# Disable language/cloud modules that would otherwise auto-show.
[aws]
disabled = true
[gcloud]
disabled = true
[python]
disabled = true
[nodejs]
disabled = true
[golang]
disabled = true
[rust]
disabled = true
[ruby]
disabled = true
[package]
disabled = true
[time]
disabled = true
[username]
show_always = false
[hostname]
ssh_only = true
